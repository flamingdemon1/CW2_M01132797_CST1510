<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
AI assistance was used to help implement and debug this custom live password
component. The component only provides visual feedback and returns the typed
value to Streamlit; final password validation and bcrypt hashing remain in Python.
-->
  <style>
    :root {
      --gk-card: #0b1220;
      --gk-surface: #0b1220;
      --gk-input: #07101c;
      --gk-border: #1e3a4f;
      --gk-border-soft: #172638;
      --gk-text: #f4f7fb;
      --gk-muted: #a8b4c6;
      --gk-primary-border: #0891b2;
      --gk-danger: #e11d48;
      --gk-warning: #d97706;
      --gk-success: #059669;
    }

    :root[data-theme="light"] {
      --gk-card: #ffffff;
      --gk-surface: #ffffff;
      --gk-input: #ffffff;
      --gk-border: #b8cbd9;
      --gk-border-soft: #d7e3ec;
      --gk-text: #102235;
      --gk-muted: #526579;
      --gk-primary-border: #036b86;
      --gk-danger: #be123c;
      --gk-warning: #b45309;
      --gk-success: #047857;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 0;
      background-color: transparent !important;
      background-image: none !important;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      color: var(--gk-text);
      font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 0 0 0.4rem;
      font-weight: 600;
    }

    .password-control {
      position: relative;
    }

    input {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 2.5rem;
      min-height: 2.5rem;
      padding: 0.5rem 2.75rem 0.5rem 0.75rem;
      border: 1px solid var(--gk-border);
      border-radius: 0.5rem;
      outline: none;
      background: var(--gk-input) !important;
      color: var(--gk-text);
      -webkit-text-fill-color: var(--gk-text);
      font: inherit;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: var(--gk-text);
      box-shadow: 0 0 0 1000px var(--gk-input) inset;
      caret-color: var(--gk-text);
    }

    input:focus {
      border-color: var(--gk-primary-border);
      box-shadow: 0 0 0 1px var(--gk-primary-border);
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 0.45rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      border: 0;
      border-radius: 0.4rem;
      background: transparent;
      color: var(--gk-muted);
      cursor: pointer;
      transform: translateY(-50%);
    }

    .toggle-password:hover,
    .toggle-password:focus {
      color: var(--gk-text);
      background: var(--gk-border-soft);
      outline: none;
    }

    .toggle-password svg {
      width: 1.1rem;
      height: 1.1rem;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .strength-row {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.65rem;
      color: var(--gk-muted);
      font-size: 0.82rem;
    }

    .track {
      height: 0.32rem;
      margin-top: 0.4rem;
      overflow: hidden;
      border-radius: 999px;
      background: var(--gk-border-soft);
    }

    .bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--gk-danger);
      transition: width 100ms ease, background-color 100ms ease;
    }

    .requirements {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.35rem 0.8rem;
      margin: 0.75rem 0 0;
      color: var(--gk-muted);
      font-size: 0.78rem;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      line-height: 1.35;
    }

    .requirement::before {
      width: 0.42rem;
      height: 0.42rem;
      flex: 0 0 0.42rem;
      border-radius: 2px;
      background: var(--gk-border-soft);
      content: "";
    }

    .requirement.met {
      color: var(--gk-success);
    }

    .requirement.met::before {
      background: var(--gk-success);
    }

    @media (max-width: 430px) {
      .requirements { grid-template-columns: 1fr; }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <label id="field-label" for="password-field">New password</label>
  <div class="password-control">
    <input
      id="password-field"
      type="password"
      autocomplete="new-password"
      spellcheck="false"
    >
    <button
      id="toggle-password"
      class="toggle-password"
      type="button"
      aria-label="Show password"
      title="Show password"
    >
      <svg id="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </div>
  <div id="strength-feedback">
    <div class="strength-row">
      <span>Password strength</span>
      <strong id="strength-label" role="status" aria-live="polite">Start typing</strong>
    </div>
    <div class="track" aria-hidden="true"><div id="strength-bar" class="bar"></div></div>
    <div class="requirements" aria-label="Password requirements">
      <span id="length-check" class="requirement">8 or more characters</span>
      <span id="uppercase-check" class="requirement">Uppercase letter</span>
      <span id="number-check" class="requirement">Number</span>
      <span id="symbol-check" class="requirement">Symbol</span>
    </div>
  </div>

  <script>
    const input = document.getElementById("password-field");
    const toggleButton = document.getElementById("toggle-password");
    const eyeIcon = document.getElementById("eye-icon");
    const label = document.getElementById("field-label");
    const strengthFeedback = document.getElementById("strength-feedback");
    const strengthLabel = document.getElementById("strength-label");
    const strengthBar = document.getElementById("strength-bar");
    let showStrength = true;

    const checks = {
      length: document.getElementById("length-check"),
      uppercase: document.getElementById("uppercase-check"),
      number: document.getElementById("number-check"),
      symbol: document.getElementById("symbol-check"),
    };

    function send(type, data = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type,
        ...data,
      }, "*");
    }

    function setFrameHeight() {
      send("streamlit:setFrameHeight", { height: document.body.scrollHeight + 4 });
    }

    function setComponentValue(value) {
      send("streamlit:setComponentValue", { value, dataType: "json" });
    }

    function setRequirement(element, passed, text) {
      element.classList.toggle("met", passed);
      element.textContent = text;
    }

    function calculateStrength(password) {
      const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        symbol: /[^A-Za-z0-9]/.test(password),
        long: password.length >= 12,
      };

      let score = 0;
      if (requirements.length) score += 20;
      if (requirements.uppercase) score += 15;
      if (requirements.lowercase) score += 15;
      if (requirements.number) score += 15;
      if (requirements.symbol) score += 20;
      if (requirements.long) score += 15;

      let strength = { label: "Very weak", colour: "var(--gk-danger)" };
      if (score > 80) strength = { label: "Very strong", colour: "var(--gk-success)" };
      else if (score > 60) strength = { label: "Strong", colour: "var(--gk-success)" };
      else if (score > 40) strength = { label: "Medium", colour: "var(--gk-warning)" };
      else if (score > 20) strength = { label: "Weak", colour: "var(--gk-danger)" };

      return { score, requirements, ...strength };
    }

    function updateFeedback(sendValue = true) {
      const password = input.value;
      const result = calculateStrength(password);

      if (showStrength) {
        strengthLabel.textContent = password ? `${result.label} (${result.score}%)` : "Start typing";
        strengthBar.style.width = `${result.score}%`;
        strengthBar.style.backgroundColor = result.colour;

        setRequirement(checks.length, result.requirements.length, "8 or more characters");
        setRequirement(checks.uppercase, result.requirements.uppercase, "Uppercase letter");
        setRequirement(checks.number, result.requirements.number, "Number");
        setRequirement(checks.symbol, result.requirements.symbol, "Symbol");
      }

      if (sendValue) setComponentValue(password);
      setFrameHeight();
    }

    function updateVisibilityIcon(isVisible) {
      toggleButton.setAttribute("aria-label", isVisible ? "Hide password" : "Show password");
      toggleButton.setAttribute("title", isVisible ? "Hide password" : "Show password");

      eyeIcon.innerHTML = isVisible
        ? '<path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path><path d="M9.9 4.2A9.8 9.8 0 0 1 12 4c6.5 0 10 8 10 8a17.6 17.6 0 0 1-3.2 4.4"></path><path d="M6.1 6.1C3.5 8 2 12 2 12s3.5 8 10 8a9.6 9.6 0 0 0 4.1-.9"></path>'
        : '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path><circle cx="12" cy="12" r="3"></circle>';
    }

    function togglePasswordVisibility() {
      const shouldShow = input.type === "password";
      input.type = shouldShow ? "text" : "password";
      updateVisibilityIcon(shouldShow);
      input.focus();
    }

    window.addEventListener("message", event => {
      if (event.data.type !== "streamlit:render") return;

      const args = event.data.args || {};
      document.documentElement.dataset.theme = args.theme === "light" ? "light" : "dark";
      showStrength = args.show_strength !== false;
      strengthFeedback.classList.toggle("hidden", !showStrength);
      const colours = args.colours || {};
      Object.entries(colours).forEach(([name, value]) => {
        const variableName = `--gk-${name.replaceAll("_", "-")}`;
        document.documentElement.style.setProperty(variableName, value);
      });
      label.textContent = args.label || "New password";
      updateFeedback(false);
    });

    input.addEventListener("input", () => updateFeedback(true));
    toggleButton.addEventListener("click", togglePasswordVisibility);
    window.addEventListener("resize", setFrameHeight);

    send("streamlit:componentReady", { apiVersion: 1 });
    setFrameHeight();
  </script>
</body>
</html>
